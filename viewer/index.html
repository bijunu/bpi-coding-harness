<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wire Trace Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-surface: #161b22;
    --bg-raised: #1c2128;
    --bg-hover: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --orange: #d29922;
    --orange-bg: #2d2000;
    --green: #3fb950;
    --green-bg: #0d2818;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d2c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }
  /* Top bar - turn stepper */
  #stepper {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  #stepper .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    min-width: 72px;
  }
  #stepper .step .circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    border: 2px solid var(--border);
    color: var(--text-dim);
    transition: all 0.15s;
  }
  #stepper .step.selected .circle {
    border-color: var(--accent);
    color: var(--text-bright);
    background: var(--accent-dim);
  }
  #stepper .step:hover .circle {
    border-color: var(--accent);
  }
  #stepper .step .meta {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
  }
  #stepper .connector {
    flex: 0 0 24px;
    height: 2px;
    background: var(--border);
    align-self: flex-start;
    margin-top: 18px;
  }
  /* Main layout */
  #main {
    display: flex;
    height: calc(100vh - 100px);
  }
  /* Left pane */
  #left {
    width: 280px;
    min-width: 280px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg-surface);
  }
  .turn-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.1s;
  }
  .turn-card:hover { background: var(--bg-hover); }
  .turn-card.selected {
    background: var(--bg-raised);
    border-left-color: var(--accent);
  }
  .turn-card .turn-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .turn-card .turn-num {
    font-weight: 700;
    color: var(--text-bright);
    font-size: 14px;
  }
  .turn-card .cost {
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
  }
  .turn-card .token-row {
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .turn-card .token-row span { white-space: nowrap; }
  .token-bar {
    height: 6px;
    border-radius: 3px;
    display: flex;
    overflow: hidden;
    margin-top: 6px;
    background: var(--bg);
  }
  .token-bar div { height: 100%; min-width: 1px; }
  .tb-input { background: var(--accent); }
  .tb-output { background: var(--green); }
  .tb-cache-read { background: var(--purple); }
  .tb-cache-write { background: var(--orange); }
  /* Right pane */
  #right {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    background: var(--bg);
  }
  .section {
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-stop { background: var(--green-bg); color: var(--green); }
  .badge-tool-use { background: #1a1a3e; color: var(--accent); }
  .badge-cache { background: var(--orange-bg); color: var(--orange); }
  .badge-duration { background: var(--bg-raised); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-tokens { background: var(--bg-raised); color: var(--cyan); border: 1px solid var(--border); }
  /* Collapsible blocks */
  .collapsible {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 5px;
    overflow: hidden;
  }
  .collapsible-header {
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .collapsible-header:hover { background: var(--bg-hover); }
  .collapsible-header .arrow {
    color: var(--text-dim);
    font-size: 10px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .collapsible.open .arrow { transform: rotate(90deg); }
  .collapsible-body {
    display: none;
    padding: 6px 10px;
    border-top: 1px solid var(--border);
  }
  .collapsible.open .collapsible-body { display: block; }
  /* Context tax bars */
  .ctx-bar-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .ctx-bar-wrap {
    height: 24px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
    margin-bottom: 4px;
    position: relative;
  }
  .ctx-bar-fill {
    display: flex;
    height: 100%;
  }
  .ctx-bar-fill .seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 4px;
    height: 100%;
  }
  .seg-system { background: var(--accent); color: var(--bg); }
  .seg-tools { background: var(--orange); color: var(--bg); }
  .seg-messages { background: var(--green); color: var(--bg); }
  .ctx-bar-sublabel {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  /* Code / pre blocks */
  .code-block {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
    position: relative;
  }
  .code-block.capped {
    max-height: 300px;
    overflow: hidden;
  }
  .code-block.capped::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(transparent, var(--bg-raised));
    pointer-events: none;
  }
  .code-block.expanded { max-height: none; }
  .code-block.expanded::after { display: none; }
  .show-more-btn {
    display: block;
    margin: 4px 0 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .show-more-btn:hover { background: var(--bg-hover); }
  /* Message blocks */
  .msg-block {
    margin-bottom: 6px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .msg-user { border-left: 3px solid var(--green); }
  .msg-assistant { border-left: 3px solid var(--accent); }
  .msg-tool-result { border-left: 3px solid var(--purple); }
  .msg-role {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .msg-role-user { color: var(--green); }
  .msg-role-assistant { color: var(--accent); }
  .msg-role-tool { color: var(--purple); }
  .thinking-block {
    color: var(--text-dim);
    font-style: italic;
    padding: 6px 10px;
    background: var(--bg);
    border-radius: 4px;
    margin: 4px 0;
  }
  .tool-call-block {
    margin: 4px 0;
    padding: 6px 10px;
    background: var(--bg);
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .tool-call-name {
    color: var(--accent);
    font-weight: 700;
  }
  .tool-call-args {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
  }
  .text-content {
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Usage row */
  .usage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .usage-cell {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
  }
  .usage-cell .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .usage-cell .label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  /* Tool list in schema section */
  .tool-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .tool-item:last-child { border-bottom: none; }
  .tool-item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .tool-item-header:hover { color: var(--text-bright); }
  .tool-item-name { color: var(--accent); font-weight: 700; }
  .tool-item-desc { color: var(--text-dim); font-size: 12px; }
  .tool-item-schema {
    display: none;
    margin-top: 6px;
  }
  .tool-item.open .tool-item-schema { display: block; }
  /* Cache pill */
  .cache-pill {
    display: inline-block;
    padding: 0 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    background: var(--orange-bg);
    color: var(--orange);
    margin-left: 4px;
    vertical-align: middle;
  }
  /* Legend */
  .legend {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  .empty-state {
    color: var(--text-dim);
    text-align: center;
    margin-top: 100px;
    font-size: 14px;
  }
  /* Trace switcher */
  #trace-switcher {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  #trace-switcher label {
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #trace-switcher select {
    background: var(--bg-raised);
    color: var(--text-bright);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  #trace-switcher select:hover { border-color: var(--accent); }
  /* Skill badge */
  .badge-skill {
    background: var(--orange-bg);
    color: var(--orange);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 700;
    margin-left: 4px;
  }
  .skill-note {
    font-size: 11px;
    color: var(--orange);
    padding: 5px 10px;
    background: var(--orange-bg);
    border: 1px solid #3d2e00;
    border-radius: 5px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div id="trace-switcher"></div>
<div id="stepper"></div>
<div id="main">
  <div id="left"></div>
  <div id="right"><div class="empty-state">Loading trace...</div></div>
</div>

<script>
(async function() {
  const TRACES = ["demo-v1", "skill-use", "skill-build", "smoke-test", "dedup-check"];

  let turns = [];
  let selectedTurn = 0;
  let currentTrace = '';
  // skill detected per turn index: null or skill name string
  let turnSkills = [];

  // --- Trace switcher ---
  function renderSwitcher() {
    const el = document.getElementById('trace-switcher');
    let opts = TRACES.map(t => `<option value="${t}"${t === currentTrace ? ' selected' : ''}>${t}</option>`).join('');
    el.innerHTML = `<label>Trace:</label><select id="trace-select" onchange="switchTrace(this.value)">${opts}</select>`;
  }

  window.switchTrace = async function(name) {
    window.location.hash = 'trace=' + name;
    await loadTrace(name);
  };

  async function loadTrace(name) {
    currentTrace = name;
    selectedTurn = 0;
    turns = [];
    turnSkills = [];

    const [wireText] = await Promise.all([
      fetch('../traces/' + name + '/wire.jsonl').then(r => r.text()),
    ]);

    const wireRecords = wireText.trim().split('\n').map(l => JSON.parse(l));

    const bySeq = {};
    for (const rec of wireRecords) {
      const seq = rec.seq;
      if (!bySeq[seq]) bySeq[seq] = {};
      bySeq[seq][rec.type] = rec;
    }
    for (const seq of Object.keys(bySeq).map(Number).sort((a, b) => a - b)) {
      turns.push({ seq, request: bySeq[seq].request, response: bySeq[seq].response });
    }

    // Detect skills per turn
    detectSkills();

    renderSwitcher();
    renderStepper();
    renderLeft();
    renderRight();
  }

  function detectSkills() {
    turnSkills = turns.map(turn => {
      const content = turn.response.body.content || [];
      for (const block of content) {
        if (block.type === 'toolCall' && block.name === 'read') {
          const path = block.arguments?.path || '';
          const m = path.match(/\/skills\/([^/]+)\/SKILL\.md$/);
          if (m) return m[1];
        }
      }
      return null;
    });
  }

  // --- Read hash ---
  function traceFromHash() {
    const h = window.location.hash.replace('#', '');
    const m = h.match(/trace=([^&]+)/);
    return m ? m[1] : null;
  }

  window.addEventListener('hashchange', () => {
    const t = traceFromHash();
    if (t && t !== currentTrace && TRACES.includes(t)) loadTrace(t);
  });

  // --- Helpers ---
  function approxTokens(text) {
    return Math.ceil((text || '').length / 4);
  }

  function fmtCost(c) {
    if (c < 0.001) return '$' + c.toFixed(6);
    return '$' + c.toFixed(4);
  }

  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function makeCollapsible(title, bodyHtml, startOpen = false, extraBadges = '') {
    return `<div class="collapsible${startOpen ? ' open' : ''}">
      <div class="collapsible-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="arrow">&#9654;</span>
        <span>${title}</span>${extraBadges}
      </div>
      <div class="collapsible-body">${bodyHtml}</div>
    </div>`;
  }

  function renderCappedCode(text, id) {
    const needsCap = text.length > 1200;
    return `<div class="code-block${needsCap ? ' capped' : ''}" id="${id}">${escHtml(text)}</div>${
      needsCap ? `<button class="show-more-btn" onclick="toggleExpand('${id}', this)">show more</button>` : ''
    }`;
  }

  // global toggle
  window.toggleExpand = function(id, btn) {
    const el = document.getElementById(id);
    if (el.classList.contains('expanded')) {
      el.classList.remove('expanded');
      el.classList.add('capped');
      btn.textContent = 'show more';
    } else {
      el.classList.remove('capped');
      el.classList.add('expanded');
      btn.textContent = 'show less';
    }
  };

  // --- Render stepper ---
  function renderStepper() {
    const el = document.getElementById('stepper');
    let html = '';
    turns.forEach((turn, i) => {
      if (i > 0) html += '<div class="connector"></div>';
      const msgCount = turn.request.payload.messages.length;
      const usage = turn.response.body.usage;
      html += `<div class="step${i === selectedTurn ? ' selected' : ''}" onclick="selectTurn(${i})">
        <div class="circle">${turn.seq}</div>
        <div class="meta">${msgCount} msg${msgCount !== 1 ? 's' : ''} &middot; ${fmtNum(usage.totalTokens)} tok</div>
      </div>`;
    });
    el.innerHTML = html;
  }

  // --- Render left pane ---
  function renderLeft() {
    const el = document.getElementById('left');
    let html = '';
    turns.forEach((turn, i) => {
      const u = turn.response.body.usage;
      const total = u.input + u.output + u.cacheRead + u.cacheWrite;
      const pct = (v) => total ? (v / total * 100) : 0;
      const sr = turn.response.body.stopReason;

      html += `<div class="turn-card${i === selectedTurn ? ' selected' : ''}" onclick="selectTurn(${i})">
        <div class="turn-header">
          <span class="turn-num">Turn ${turn.seq}</span>
          <span class="cost">${fmtCost(u.cost.total)}</span>
        </div>
        <div style="margin-bottom:4px">
          <span class="badge ${sr === 'stop' ? 'badge-stop' : 'badge-tool-use'}">${sr}</span>
          <span class="badge badge-duration">${turn.response.durationMs}ms</span>${
            turnSkills[i] ? `<span class="badge-skill">SKILL: ${escHtml(turnSkills[i])}</span>` : ''
          }
        </div>
        <div class="token-row">
          <span>in:${fmtNum(u.input)}</span>
          <span>out:${fmtNum(u.output)}</span>
          <span>c-rd:${fmtNum(u.cacheRead)}</span>
          <span>c-wr:${fmtNum(u.cacheWrite)}</span>
        </div>
        <div class="token-bar">
          <div class="tb-input" style="width:${pct(u.input)}%"></div>
          <div class="tb-cache-read" style="width:${pct(u.cacheRead)}%"></div>
          <div class="tb-cache-write" style="width:${pct(u.cacheWrite)}%"></div>
          <div class="tb-output" style="width:${pct(u.output)}%"></div>
        </div>
      </div>`;
    });
    el.innerHTML = html;
  }

  // --- Render right pane ---
  function renderRight() {
    const turn = turns[selectedTurn];
    const req = turn.request.payload;
    const resp = turn.response.body;
    const usage = resp.usage;

    let html = '';

    // Skill note
    if (turnSkills[selectedTurn]) {
      html += `<div class="skill-note">This turn loaded the <strong>${escHtml(turnSkills[selectedTurn])}</strong> skill.</div>`;
    }

    // ====== CONTEXT TAX BAR (always show, but emphasize on turn 1) ======
    const systemText = req.system.map(s => s.text).join('\n');
    const toolsText = JSON.stringify(req.tools);
    const msgsText = JSON.stringify(req.messages);

    // Use real usage for turn 1 context tax: cacheWrite = system+tools+new content written to cache
    // For the stacked bar, estimate proportions from text sizes but label with real token counts
    const systemApprox = approxTokens(systemText);
    const toolsApprox = approxTokens(toolsText);
    const msgsApprox = approxTokens(msgsText);
    const totalApprox = systemApprox + toolsApprox + msgsApprox;

    const CONTEXT_WINDOW = 200000;
    const sysFrac = (systemApprox / totalApprox * 100).toFixed(1);
    const toolsFrac = (toolsApprox / totalApprox * 100).toFixed(1);
    const msgsFrac = (msgsApprox / totalApprox * 100).toFixed(1);
    const fillPct = (totalApprox / CONTEXT_WINDOW * 100);
    const barWidthPct = Math.max(fillPct, 2.5).toFixed(2);

    html += '<div class="section">';
    html += '<div class="section-title">Context Tax</div>';

    // --- Top bar: composition (full width, within-turn breakdown) ---
    html += '<div class="ctx-bar-label">Composition</div>';
    html += `<div class="ctx-bar-wrap">
      <div class="ctx-bar-fill" style="width:100%">
        <div class="seg seg-system" style="width:${sysFrac}%">${Number(sysFrac) > 10 ? `system ${sysFrac}%` : ''}</div>
        <div class="seg seg-tools" style="width:${toolsFrac}%">${Number(toolsFrac) > 10 ? `tools ${toolsFrac}%` : ''}</div>
        <div class="seg seg-messages" style="width:${msgsFrac}%">${Number(msgsFrac) > 10 ? `msgs ${msgsFrac}%` : ''}</div>
      </div>
    </div>`;
    html += `<div class="legend" style="margin-bottom:8px">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>system ~${fmtNum(systemApprox)}</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>tools ~${fmtNum(toolsApprox)}</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>msgs ~${fmtNum(msgsApprox)}</div>
    </div>`;

    // --- Bottom bar: context window usage (absolute scale) ---
    html += '<div class="ctx-bar-label">Context window</div>';
    html += `<div class="ctx-bar-wrap">
      <div class="ctx-bar-fill" style="width:${barWidthPct}%">
        <div class="seg seg-system" style="width:${sysFrac}%"></div>
        <div class="seg seg-tools" style="width:${toolsFrac}%"></div>
        <div class="seg seg-messages" style="width:${msgsFrac}%"></div>
      </div>
    </div>`;
    html += `<div class="ctx-bar-sublabel">${fmtNum(totalApprox)} / ${fmtNum(CONTEXT_WINDOW)} tokens &middot; ${fillPct.toFixed(1)}% used</div>`;

    html += '</div>';

    // ====== REQUEST: SYSTEM PROMPT ======
    html += '<div class="section">';
    html += '<div class="section-title">Request Payload</div>';

    // System prompt
    const cacheBadge = req.system[0]?.cache_control
      ? ' <span class="cache-pill">CACHE ephemeral</span>'
      : '';
    html += makeCollapsible(
      `System Prompt <span class="badge badge-tokens">~${fmtNum(systemApprox)} tokens</span>${cacheBadge}`,
      renderCappedCode(systemText, `sys-${turn.seq}`),
      turn.seq === 1
    );

    // Tools
    let toolsBody = '';
    req.tools.forEach((tool, ti) => {
      const hasCacheCtrl = tool.cache_control;
      const cPill = hasCacheCtrl ? ' <span class="cache-pill">CACHE ephemeral</span>' : '';
      toolsBody += `<div class="tool-item" id="tool-${turn.seq}-${ti}">
        <div class="tool-item-header" onclick="document.getElementById('tool-${turn.seq}-${ti}').classList.toggle('open')">
          <span class="arrow" style="font-size:10px">&#9654;</span>
          <span class="tool-item-name">${escHtml(tool.name)}</span>${cPill}
          <span class="tool-item-desc">${escHtml(tool.description.slice(0, 80))}${tool.description.length > 80 ? '...' : ''}</span>
        </div>
        <div class="tool-item-schema">
          <div class="code-block" style="font-size:11px">${escHtml(JSON.stringify(tool.input_schema, null, 2))}</div>
        </div>
      </div>`;
    });
    html += makeCollapsible(
      `Tool Schemas <span class="badge badge-tokens">${req.tools.length} tools &middot; ~${fmtNum(toolsApprox)} tokens</span>`,
      toolsBody,
      false
    );

    // Messages
    html += '<div style="margin-top:8px">';
    html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:600">MESSAGES (${req.messages.length})</div>`;
    req.messages.forEach((msg, mi) => {
      if (msg.role === 'user') {
        // Could be a plain user message or tool_results
        const contents = Array.isArray(msg.content) ? msg.content : [{ type: 'text', text: msg.content }];
        const hasToolResults = contents.some(c => c.type === 'tool_result');
        if (hasToolResults) {
          contents.forEach((c, ci) => {
            if (c.type === 'tool_result') {
              const cachePill = c.cache_control ? ' <span class="cache-pill">CACHE</span>' : '';
              const resultText = typeof c.content === 'string' ? c.content :
                Array.isArray(c.content) ? c.content.map(b => b.text || '').join('\n') : JSON.stringify(c.content);
              html += `<div class="msg-block msg-tool-result">
                <div class="msg-role msg-role-tool">tool_result${cachePill}</div>
                ${renderCappedCode(resultText, `tr-${turn.seq}-${mi}-${ci}`)}
              </div>`;
            } else if (c.type === 'text') {
              const cachePill = c.cache_control ? ' <span class="cache-pill">CACHE</span>' : '';
              html += `<div class="msg-block msg-user">
                <div class="msg-role msg-role-user">user${cachePill}</div>
                <div class="text-content">${escHtml(c.text)}</div>
              </div>`;
            }
          });
        } else {
          // Plain user message
          contents.forEach(c => {
            if (c.type === 'text') {
              const cachePill = c.cache_control ? ' <span class="cache-pill">CACHE</span>' : '';
              html += `<div class="msg-block msg-user">
                <div class="msg-role msg-role-user">user${cachePill}</div>
                <div class="text-content">${escHtml(c.text)}</div>
              </div>`;
            }
          });
        }
      } else if (msg.role === 'assistant') {
        html += `<div class="msg-block msg-assistant">
          <div class="msg-role msg-role-assistant">assistant</div>`;
        const contents = Array.isArray(msg.content) ? msg.content : [];
        contents.forEach(c => {
          if (c.type === 'thinking') {
            html += `<div class="thinking-block">${escHtml(c.thinking)}</div>`;
          } else if (c.type === 'tool_use') {
            html += `<div class="tool-call-block">
              <span class="tool-call-name">${escHtml(c.name)}</span>
              <div class="tool-call-args">${escHtml(JSON.stringify(c.input, null, 2))}</div>
            </div>`;
          } else if (c.type === 'text') {
            html += `<div class="text-content">${escHtml(c.text)}</div>`;
          }
        });
        html += '</div>';
      }
    });
    html += '</div>';
    html += '</div>';

    // ====== RESPONSE ======
    html += '<div class="section">';
    html += '<div class="section-title">Response';
    html += ` <span class="badge ${resp.stopReason === 'stop' ? 'badge-stop' : 'badge-tool-use'}">${resp.stopReason}</span>`;
    html += ` <span class="badge badge-duration">${turn.response.durationMs}ms</span>`;
    html += '</div>';

    // Content blocks
    resp.content.forEach((block, bi) => {
      if (block.type === 'thinking') {
        html += makeCollapsible(
          'Thinking',
          `<div class="thinking-block">${escHtml(block.thinking)}</div>`,
          false
        );
      } else if (block.type === 'toolCall') {
        html += `<div class="tool-call-block" style="margin-bottom:8px">
          <span class="tool-call-name">${escHtml(block.name)}</span>
          <div class="tool-call-args">${escHtml(JSON.stringify(block.arguments, null, 2))}</div>
        </div>`;
      } else if (block.type === 'text') {
        html += `<div class="msg-block msg-assistant" style="margin-bottom:8px">
          <div class="text-content">${escHtml(block.text)}</div>
        </div>`;
      }
    });

    // Usage grid
    html += '<div style="margin-top:10px">';
    html += '<div class="section-title">Token Usage &amp; Cost</div>';
    html += '<div class="usage-grid">';
    html += `<div class="usage-cell"><div class="val">${fmtNum(usage.input)}</div><div class="label">Input</div></div>`;
    html += `<div class="usage-cell"><div class="val">${fmtNum(usage.output)}</div><div class="label">Output</div></div>`;
    html += `<div class="usage-cell"><div class="val" style="color:var(--purple)">${fmtNum(usage.cacheRead)}</div><div class="label">Cache Read</div></div>`;
    html += `<div class="usage-cell"><div class="val" style="color:var(--orange)">${fmtNum(usage.cacheWrite)}</div><div class="label">Cache Write</div></div>`;
    html += `<div class="usage-cell"><div class="val">${fmtNum(usage.totalTokens)}</div><div class="label">Total</div></div>`;
    html += `<div class="usage-cell"><div class="val" style="color:var(--green)">${fmtCost(usage.cost.total)}</div><div class="label">Cost</div></div>`;
    html += '</div>';

    // Cost breakdown
    html += '<div style="margin-top:8px;font-size:11px;color:var(--text-dim)">';
    html += `input: ${fmtCost(usage.cost.input)} &middot; output: ${fmtCost(usage.cost.output)} &middot; cache_read: ${fmtCost(usage.cost.cacheRead)} &middot; cache_write: ${fmtCost(usage.cost.cacheWrite)}`;
    html += '</div>';

    html += '</div>';
    html += '</div>';

    document.getElementById('right').innerHTML = html;
  }

  // --- Selection ---
  window.selectTurn = function(i) {
    selectedTurn = i;
    renderStepper();
    renderLeft();
    renderRight();
    document.getElementById('right').scrollTop = 0;
  };

  // --- Init ---
  const initTrace = traceFromHash() || TRACES[0];
  await loadTrace(initTrace);
})();
</script>
</body>
</html>
